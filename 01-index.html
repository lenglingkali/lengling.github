        /* 折叠组件样式 */
        details {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        summary {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer; /* 鼠标悬浮显示手型 */
        }
        /* 照片网格（折叠后默认隐藏） */
        .photo-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .student-photo {
            text-align: center;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 8px;
        }
        .student-photo img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
